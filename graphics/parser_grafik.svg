<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Parser mit StringBuilder</title>
  <desc id="desc">Didaktische Prozessgrafik für einen einfachen Text-Parser mit StringBuilder.</desc>

  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-tight { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }
      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .muted { fill: #666; }

      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }
      .panel-neutral { stroke: #b9bcc3; }

      .header-neutral { fill: #f2f4f7; stroke: #b9bcc3; stroke-width: 2; }
      .hint-box { fill: #f8f1e1; stroke: #d89b37; stroke-width: 2.2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }
      .flow { stroke: #2b65b3; stroke-width: 3.2; fill: none; }
    </style>

    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>

  <text x="900" y="72" text-anchor="middle" class="title">Parser mit StringBuilder</text>
  <text x="900" y="104" text-anchor="middle" class="small">Prozessgrafik · de-CH · EFZ Applikationsentwicklung</text>

  <!-- Hauptpanel -->
  <rect x="60" y="140" rx="20" ry="20" width="1680" height="620" class="panel panel-neutral"/>
  <rect x="80" y="158" rx="16" ry="16" width="1640" height="64" class="header-neutral"/>
  <text x="900" y="200" text-anchor="middle" class="section">Ablauf: Text analysieren und Ausgabe effizient zusammenbauen</text>

  <!-- Schritte -->
  <rect x="100" y="320" rx="18" ry="18" width="270" height="160" class="panel panel-left"/>
  <text x="235" y="374" text-anchor="middle" class="heading left-accent">1. Eingabe lesen</text>
  <text x="235" y="412" text-anchor="middle" class="text-tight">Text und Delimiter</text>
  <text x="235" y="442" text-anchor="middle" class="text-tight">als String übernehmen</text>

  <rect x="420" y="320" rx="18" ry="18" width="270" height="160" class="panel panel-right"/>
  <text x="555" y="374" text-anchor="middle" class="heading right-accent">2. Zerlegen</text>
  <text x="555" y="412" text-anchor="middle" class="text-tight">Text in Teile aufspalten</text>
  <text x="555" y="442" text-anchor="middle" class="text-tight">und Wörter prüfen</text>

  <rect x="740" y="320" rx="18" ry="18" width="270" height="160" class="panel panel-left"/>
  <text x="875" y="374" text-anchor="middle" class="heading left-accent">3. Bereinigen</text>
  <text x="875" y="412" text-anchor="middle" class="text-tight">Delimiter am Rand</text>
  <text x="875" y="442" text-anchor="middle" class="text-tight">entfernen und zählen</text>

  <rect x="1060" y="320" rx="18" ry="18" width="270" height="160" class="panel panel-right"/>
  <text x="1195" y="374" text-anchor="middle" class="heading right-accent">4. Klassifizieren</text>
  <text x="1195" y="412" text-anchor="middle" class="text-tight">Wortart bestimmen:</text>
  <text x="1195" y="442" text-anchor="middle" class="text-tight">klein, gross, Grossstart</text>

  <rect x="1380" y="320" rx="18" ry="18" width="270" height="160" class="panel panel-left"/>
  <text x="1515" y="374" text-anchor="middle" class="heading left-accent">5. Ausgeben</text>
  <text x="1515" y="412" text-anchor="middle" class="text-tight">Resultate mit</text>
  <text x="1515" y="442" text-anchor="middle" class="text-tight">StringBuilder bauen</text>

  <!-- Flows -->
  <line x1="370" y1="400" x2="420" y2="400" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="690" y1="400" x2="740" y2="400" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="1010" y1="400" x2="1060" y2="400" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="1330" y1="400" x2="1380" y2="400" class="flow" marker-end="url(#arrowRight)"/>

  <!-- Untere Erklärboxen -->
  <rect x="140" y="540" rx="18" ry="18" width="470" height="132" class="hint-box"/>
  <text x="375" y="582" text-anchor="middle" class="heading hint-accent">Warum StringBuilder?</text>
  <text x="375" y="618" text-anchor="middle" class="text-tight">Wortliste, Statistik und</text>
  <text x="375" y="648" text-anchor="middle" class="text-tight">Gesamtausgabe wachsen schrittweise</text>

  <rect x="665" y="540" rx="18" ry="18" width="470" height="132" class="panel panel-right"/>
  <text x="900" y="582" text-anchor="middle" class="heading right-accent">Typischer Fehler</text>
  <text x="900" y="618" text-anchor="middle" class="text-tight">Ausgabe mit + in Schleifen</text>
  <text x="900" y="648" text-anchor="middle" class="text-tight">erzeugt unnötig viele Objekte</text>

  <rect x="1190" y="540" rx="18" ry="18" width="470" height="132" class="panel panel-left"/>
  <text x="1425" y="582" text-anchor="middle" class="heading left-accent">Praxisbezug</text>
  <text x="1425" y="618" text-anchor="middle" class="text-tight">Parser, Reports und Logs</text>
  <text x="1425" y="648" text-anchor="middle" class="text-tight">bauen Text oft schrittweise auf</text>

  <!-- Summary -->
  <rect x="60" y="820" rx="20" ry="20" width="1680" height="246" class="summary"/>
  <text x="98" y="866" class="section">Zusammenfassung</text>

  <circle cx="112" cy="912" r="6.5" fill="#6ca05f"/>
  <text x="132" y="920" class="text-tight">Eingabe und Delimiter starten als String</text>

  <circle cx="112" cy="958" r="6.5" fill="#2b65b3"/>
  <text x="132" y="966" class="text-tight">Wörter werden zerlegt, bereinigt und klassifiziert</text>

  <circle cx="112" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="132" y="1012" class="text-tight">Delimiter können beim Bereinigen mitgezählt werden</text>

  <circle cx="900" cy="912" r="6.5" fill="#2b65b3"/>
  <text x="920" y="920" class="text-tight">Die Ausgabe wächst Schritt für Schritt</text>

  <circle cx="900" cy="958" r="6.5" fill="#6ca05f"/>
  <text x="920" y="966" class="text-tight">StringBuilder passt gut für Listen, Statistiken und Reports</text>

  <circle cx="900" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="920" y="1012" class="text-tight">Merksatz: Verarbeiten mit String, Ausgeben oft mit StringBuilder</text>
</svg>
