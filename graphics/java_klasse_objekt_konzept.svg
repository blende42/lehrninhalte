<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Java: Klasse und Objekt</title>
  <desc id="desc">Konzeptgrafik zu Klasse, Objekt, Attributen, Methoden, Konstruktor und this in Java.</desc>
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-tight { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }
      .mono { font: 700 24px 'Courier New', Courier, monospace; fill: #111; }
      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }
      .panel-neutral { stroke: #b9bcc3; }
      .header-neutral { fill: #f2f4f7; stroke: #b9bcc3; stroke-width: 2; }
      .class-box { fill: #e8eef9; stroke: #6f9ce0; stroke-width: 2.4; }
      .object-box { fill: #e6efdf; stroke: #6ca05f; stroke-width: 2.4; }
      .hint-box { fill: #f8f1e1; stroke: #d89b37; stroke-width: 2.2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }
      .flow { stroke: #2b65b3; stroke-width: 3.2; fill: none; }
    </style>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>
  <text x="900" y="72" text-anchor="middle" class="title">Java: Klasse und Objekt</text>
  <text x="900" y="104" text-anchor="middle" class="small">Konzeptdiagramm · de-CH · EFZ Applikationsentwicklung</text>

  <rect x="60" y="140" rx="20" ry="20" width="1680" height="640" class="panel panel-neutral"/>
  <rect x="80" y="158" rx="16" ry="16" width="1640" height="64" class="header-neutral"/>
  <text x="900" y="200" text-anchor="middle" class="section">Eine Klasse ist der Bauplan, Objekte sind konkrete Exemplare</text>

  <rect x="150" y="275" rx="22" ry="22" width="500" height="270" class="class-box"/>
  <text x="400" y="325" text-anchor="middle" class="section right-accent">Klasse Produkt</text>
  <text x="400" y="365" text-anchor="middle" class="mono">String name;</text>
  <text x="400" y="400" text-anchor="middle" class="mono">double preis;</text>
  <text x="400" y="455" text-anchor="middle" class="mono">Produkt(...)</text>
  <text x="400" y="490" text-anchor="middle" class="mono">void ausgeben()</text>

  <text x="900" y="342" text-anchor="middle" class="heading hint-accent">new Produkt(...)</text>
  <line x1="665" y1="410" x2="1120" y2="410" class="flow" marker-end="url(#arrowRight)"/>
  <text x="900" y="460" text-anchor="middle" class="text-tight">Der Konstruktor erstellt ein Objekt</text>
  <text x="900" y="490" text-anchor="middle" class="text-tight">und setzt Startwerte.</text>

  <rect x="1160" y="250" rx="22" ry="22" width="470" height="170" class="object-box"/>
  <text x="1395" y="300" text-anchor="middle" class="heading left-accent">Objekt p1</text>
  <text x="1395" y="342" text-anchor="middle" class="mono">name = "Tastatur"</text>
  <text x="1395" y="378" text-anchor="middle" class="mono">preis = 49.90</text>

  <rect x="1160" y="470" rx="22" ry="22" width="470" height="170" class="object-box"/>
  <text x="1395" y="520" text-anchor="middle" class="heading left-accent">Objekt p2</text>
  <text x="1395" y="562" text-anchor="middle" class="mono">name = "Maus"</text>
  <text x="1395" y="598" text-anchor="middle" class="mono">preis = 24.50</text>

  <rect x="150" y="600" rx="18" ry="18" width="330" height="118" class="panel panel-left"/>
  <text x="315" y="648" text-anchor="middle" class="heading left-accent">Attribute</text>
  <text x="315" y="686" text-anchor="middle" class="text-tight">Daten eines Objekts</text>

  <rect x="510" y="600" rx="18" ry="18" width="330" height="118" class="panel panel-left"/>
  <text x="675" y="648" text-anchor="middle" class="heading left-accent">Methoden</text>
  <text x="675" y="686" text-anchor="middle" class="text-tight">Verhalten eines Objekts</text>

  <rect x="870" y="600" rx="18" ry="18" width="330" height="118" class="panel panel-right"/>
  <text x="1035" y="648" text-anchor="middle" class="heading right-accent">Konstruktor</text>
  <text x="1035" y="686" text-anchor="middle" class="text-tight">Startwerte setzen</text>

  <rect x="1230" y="680" rx="18" ry="18" width="330" height="70" class="hint-box"/>
  <text x="1395" y="725" text-anchor="middle" class="heading hint-accent">this meint dieses Objekt</text>

  <rect x="220" y="810" rx="18" ry="18" width="1360" height="78" class="hint-box"/>
  <text x="900" y="856" text-anchor="middle" class="heading hint-accent">Merksatz: Klasse beschreibt den Typ, Objekt enthält konkrete Werte.</text>

  <rect x="60" y="930" rx="20" ry="20" width="1680" height="130" class="summary"/>
  <text x="98" y="976" class="section">Zusammenfassung</text>
  <circle cx="112" cy="1020" r="6.5" fill="#6ca05f"/>
  <text x="132" y="1028" class="text-tight">Eine Klasse bündelt Attribute und Methoden.</text>
  <circle cx="900" cy="1020" r="6.5" fill="#2b65b3"/>
  <text x="920" y="1028" class="text-tight">Mit `new` entstehen einzelne Objekte mit eigenen Attributwerten.</text>
</svg>
