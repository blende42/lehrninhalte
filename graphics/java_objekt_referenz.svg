<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Java: Variable und Objekt-Referenz</title>
  <desc id="desc">Vergleichsgrafik zu Objektvariablen, Referenzen und Objektzustand in Java.</desc>
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-tight { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }
      .mono { font: 700 25px 'Courier New', Courier, monospace; fill: #111; }
      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .muted { fill: #333; }
      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }
      .header-left { fill: #dfead8; stroke: #6ca05f; stroke-width: 2; }
      .header-right { fill: #dfe8f7; stroke: #6f9ce0; stroke-width: 2; }
      .codebox { fill: #eef2ee; stroke: #bcc8bc; stroke-width: 1.5; }
      .memorybox { fill: #f3f5f7; stroke: #6b7078; stroke-width: 2.2; }
      .objectbox { fill: #f8f1e1; stroke: #d89b37; stroke-width: 2.2; }
      .cell { fill: #fffaf1; stroke: #d89b37; stroke-width: 2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }
      .arrow { stroke: #2b65b3; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>
  <text x="900" y="72" text-anchor="middle" class="title">Java: Variable und Objekt-Referenz</text>
  <text x="900" y="104" text-anchor="middle" class="small">Vergleichsgrafik · de-CH · EFZ Applikationsentwicklung</text>

  <rect x="40" y="130" rx="18" ry="18" width="710" height="710" class="panel panel-left"/>
  <rect x="58" y="146" rx="16" ry="16" width="674" height="64" class="header-left"/>
  <text x="395" y="188" text-anchor="middle" class="section">Variable bei primitiven Werten</text>
  <rect x="150" y="240" rx="12" ry="12" width="470" height="90" class="codebox"/>
  <text x="385" y="295" text-anchor="middle" class="mono">int zahl = 5;</text>
  <rect x="160" y="420" rx="20" ry="20" width="450" height="150" class="memorybox"/>
  <text x="245" y="505" class="section">zahl</text>
  <rect x="340" y="460" width="170" height="70" fill="#e6efdf" stroke="#9dbc86" stroke-width="2"/>
  <text x="425" y="505" text-anchor="middle" class="section left-accent">5</text>
  <text x="395" y="665" text-anchor="middle" class="heading left-accent">Die Variable enthält den Wert.</text>
  <text x="395" y="715" text-anchor="middle" class="text-tight">Kein separates Objekt ist nötig.</text>

  <line x1="786" y1="122" x2="786" y2="844" stroke="#c9cdd4" stroke-width="1.5" stroke-dasharray="8 8"/>

  <rect x="826" y="130" rx="18" ry="18" width="934" height="710" class="panel panel-right"/>
  <rect x="844" y="146" rx="16" ry="16" width="898" height="64" class="header-right"/>
  <text x="1293" y="188" text-anchor="middle" class="section">Variable bei Objekten</text>
  <rect x="980" y="240" rx="12" ry="12" width="550" height="90" class="codebox"/>
  <text x="1255" y="295" text-anchor="middle" class="mono">Produkt p = new Produkt(...);</text>

  <text x="1015" y="390" text-anchor="middle" class="heading">Variable</text>
  <rect x="860" y="430" rx="20" ry="20" width="315" height="150" class="memorybox"/>
  <text x="920" y="515" class="section">p</text>
  <rect x="970" y="470" width="150" height="70" fill="#e8eef9" stroke="#9eb6e4" stroke-width="2"/>
  <text x="1045" y="515" text-anchor="middle" class="text right-accent">Referenz</text>

  <text x="1450" y="390" text-anchor="middle" class="heading">Objekt</text>
  <rect x="1250" y="430" rx="20" ry="20" width="400" height="210" class="objectbox"/>
  <text x="1450" y="478" text-anchor="middle" class="heading hint-accent">Produkt-Objekt</text>
  <rect x="1280" y="505" width="140" height="56" class="cell"/>
  <rect x="1420" y="505" width="200" height="56" class="cell"/>
  <text x="1350" y="542" text-anchor="middle" class="text">name</text>
  <text x="1520" y="542" text-anchor="middle" class="text">"Maus"</text>
  <rect x="1280" y="561" width="140" height="56" class="cell"/>
  <rect x="1420" y="561" width="200" height="56" class="cell"/>
  <text x="1350" y="598" text-anchor="middle" class="text">preis</text>
  <text x="1520" y="598" text-anchor="middle" class="text">24.50</text>
  <line x1="1120" y1="505" x2="1240" y2="505" class="arrow" marker-end="url(#arrowBlue)"/>

  <text x="1255" y="705" text-anchor="middle" class="heading right-accent">Die Variable zeigt auf das Objekt.</text>
  <text x="1255" y="755" text-anchor="middle" class="text-tight">Das Objekt enthält die Attributwerte.</text>

  <rect x="60" y="888" rx="20" ry="20" width="1680" height="178" class="summary"/>
  <text x="98" y="934" class="section">Zusammenfassung</text>
  <circle cx="112" cy="978" r="6.5" fill="#6ca05f"/>
  <text x="132" y="986" class="text-tight">Primitive Variablen enthalten ihren Wert direkt.</text>
  <circle cx="112" cy="1026" r="6.5" fill="#6ca05f"/>
  <text x="132" y="1034" class="text-tight">Objektvariablen enthalten eine Referenz auf ein Objekt.</text>
  <circle cx="898" cy="978" r="6.5" fill="#2b65b3"/>
  <text x="918" y="986" class="text-tight">Mehrere Variablen können auf dasselbe Objekt zeigen.</text>
  <circle cx="898" cy="1026" r="6.5" fill="#2b65b3"/>
  <text x="918" y="1034" class="text-tight">Der Zustand eines Objekts liegt in seinen Attributen.</text>
</svg>
