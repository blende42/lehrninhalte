<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Wiederholte String-Verkettung mit +</title>
  <desc id="desc">Prozessgrafik zur wiederholten String-Verkettung in Java.</desc>
  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>

  <text x="900" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#111">Wiederholte String-Verkettung mit +</text>
  <text x="900" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#555">Prozessdiagramm · de-CH · EFZ Applikationsentwicklung</text>

  <rect x="60" y="140" rx="20" ry="20" width="1680" height="620" fill="#fbfcfb" stroke="#b9bcc3" stroke-width="2.2"/>
  <rect x="80" y="158" rx="16" ry="16" width="1640" height="64" fill="#f2f4f7" stroke="#b9bcc3" stroke-width="2"/>
  <text x="900" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111">Ablauf bei text = text + i in einer Schleife</text>

  <rect x="120" y="330" rx="18" ry="18" width="250" height="130" fill="#fbfcfb" stroke="#6ca05f" stroke-width="2.2"/>
  <text x="245" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#4d8f3a">1. Starten</text>
  <text x="245" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">String text = ""</text>

  <rect x="440" y="330" rx="18" ry="18" width="250" height="130" fill="#fbfcfb" stroke="#6f9ce0" stroke-width="2.2"/>
  <text x="565" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#2b65b3">2. Anhängen</text>
  <text x="565" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">text = text + i</text>

  <rect x="760" y="330" rx="18" ry="18" width="250" height="130" fill="#fbfcfb" stroke="#6ca05f" stroke-width="2.2"/>
  <text x="885" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#4d8f3a">3. Neu erzeugen</text>
  <text x="885" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">neues String-Objekt</text>

  <rect x="1080" y="330" rx="18" ry="18" width="250" height="130" fill="#fbfcfb" stroke="#6f9ce0" stroke-width="2.2"/>
  <text x="1205" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#2b65b3">4. Kopieren</text>
  <text x="1205" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">alter Inhalt plus i</text>

  <rect x="1400" y="330" rx="18" ry="18" width="250" height="130" fill="#fbfcfb" stroke="#6ca05f" stroke-width="2.2"/>
  <text x="1525" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#4d8f3a">5. Wiederholen</text>
  <text x="1525" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">in jeder Iteration</text>

  <line x1="370" y1="395" x2="440" y2="395" stroke="#2b65b3" stroke-width="3.2"/>
  <line x1="690" y1="395" x2="760" y2="395" stroke="#2b65b3" stroke-width="3.2"/>
  <line x1="1010" y1="395" x2="1080" y2="395" stroke="#2b65b3" stroke-width="3.2"/>
  <line x1="1330" y1="395" x2="1400" y2="395" stroke="#2b65b3" stroke-width="3.2"/>

  <rect x="160" y="540" rx="18" ry="18" width="480" height="120" fill="#f8f1e1" stroke="#d89b37" stroke-width="2.2"/>
  <text x="375" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#c67f17">Typischer Stolperstein</text>
  <text x="375" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">+ wirkt einfach, skaliert aber schlecht</text>

  <rect x="685" y="540" rx="18" ry="18" width="480" height="120" fill="#fbfcfb" stroke="#6f9ce0" stroke-width="2.2"/>
  <text x="900" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#2b65b3">Qualitätskriterium</text>
  <text x="920" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">Viele Wiederholungen lieber StringBuilder</text>

  <rect x="1210" y="540" rx="18" ry="18" width="480" height="120" fill="#fbfcfb" stroke="#6ca05f" stroke-width="2.2"/>
  <text x="1425" y="588" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#4d8f3a">Praxisbezug</text>
  <text x="1445" y="628" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">relevant in Schleifen Parsern und Reports</text>

  <rect x="60" y="820" rx="20" ry="20" width="1680" height="246" fill="#f7f8fa" stroke="#b9bcc3" stroke-width="2"/>
  <text x="98" y="866" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111">Zusammenfassung</text>
  <circle cx="112" cy="912" r="6.5" fill="#6ca05f"/>
  <text x="132" y="920" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">Start mit leerem String</text>
  <circle cx="112" cy="958" r="6.5" fill="#2b65b3"/>
  <text x="132" y="966" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">jede Verkettung erzeugt ein neues Objekt</text>
  <circle cx="112" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="132" y="1012" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">bestehender Inhalt wird wieder kopiert</text>
  <circle cx="900" cy="912" r="6.5" fill="#2b65b3"/>
  <text x="920" y="920" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">in Schleifen passiert das sehr oft</text>
  <circle cx="900" cy="958" r="6.5" fill="#6ca05f"/>
  <text x="920" y="966" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">Speicherbedarf und Laufzeit steigen</text>
  <circle cx="900" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="920" y="1012" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">StringBuilder ist bei vielen Anhängen geeigneter</text>
</svg>
