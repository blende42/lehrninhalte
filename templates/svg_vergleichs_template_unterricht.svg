<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">SVG-Vorlage Vergleichsgrafik für Unterricht</title>
  <desc id="desc">Wiederverwendbare Vergleichs-Vorlage mit zwei Spalten, Code-/Beispielbereich, Visualisierung, Erklärungen und Zusammenfassung.</desc>

  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-regular { font: 400 22px Arial, Helvetica, sans-serif; fill: #222; }
      .mono { font: 700 28px 'Courier New', Courier, monospace; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }

      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .muted { fill: #666; }

      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }

      .header-left { fill: #dfead8; stroke: #6ca05f; stroke-width: 2; }
      .header-right { fill: #dfe8f7; stroke: #6f9ce0; stroke-width: 2; }

      .placeholder-box { fill: #eef2ee; stroke: #bcc8bc; stroke-width: 1.5; }
      .viz-box { fill: #f3f5f7; stroke: #6b7078; stroke-width: 2.2; }
      .inner-left { fill: #e6efdf; stroke: #9dbc86; stroke-width: 2; }
      .inner-right { fill: #e8eef9; stroke: #9eb6e4; stroke-width: 2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }

      .guide { fill: none; stroke: #c9cdd4; stroke-width: 1.5; stroke-dasharray: 8 8; }
      .arrow-left { stroke: #6ca05f; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-right { stroke: #2b65b3; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-hint { stroke: #c67f17; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
    </style>

    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6ca05f"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
    <marker id="arrowHint" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c67f17"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>

  <!-- Titel -->
  <text x="900" y="72" text-anchor="middle" class="title">[TITEL DER VERGLEICHSGRAFIK]</text>
  <text x="900" y="104" text-anchor="middle" class="small">SVG-Vorlage für Unterrichtsunterlagen · de-CH · EFZ Applikationsentwicklung</text>

  <!-- Linkes Panel -->
  <rect x="40" y="130" rx="18" ry="18" width="710" height="710" class="panel panel-left"/>
  <rect x="58" y="146" rx="16" ry="16" width="674" height="64" class="header-left"/>
  <text x="395" y="188" text-anchor="middle" class="section">[LINKER BEREICH / KONZEPT A]</text>

  <!-- linker Code-/Beispielbereich -->
  <rect x="170" y="238" rx="12" ry="12" width="430" height="88" class="placeholder-box"/>
  <text x="385" y="292" text-anchor="middle" class="mono left-accent">[Code / Beispiel links]</text>
  <text x="385" y="350" text-anchor="middle" class="heading">[Visualisierung / Struktur links]</text>

  <!-- linke Visualisierung -->
  <rect x="150" y="382" rx="20" ry="20" width="450" height="150" class="viz-box"/>
  <text x="225" y="463" class="section">[A]</text>
  <rect x="318" y="424" width="190" height="74" class="inner-left"/>
  <text x="413" y="470" text-anchor="middle" class="heading left-accent">[Inhalt]</text>

  <!-- linker Erklärungspfeil -->
  <path d="M 413 622 L 413 504" class="arrow-left" marker-end="url(#arrowLeft)"/>
  <text x="413" y="664" text-anchor="middle" class="heading left-accent">[Erklärung links, Zeile 1]</text>
  <text x="413" y="702" text-anchor="middle" class="heading left-accent">[Erklärung links, Zeile 2]</text>
  <text x="413" y="758" text-anchor="middle" class="heading">[Kernaussage links, Zeile 1]</text>
  <text x="413" y="796" text-anchor="middle" class="heading">[Kernaussage links, Zeile 2]</text>

  <!-- Mittellinie -->
  <line x1="786" y1="122" x2="786" y2="844" class="guide"/>

  <!-- Rechtes Panel -->
  <rect x="826" y="130" rx="18" ry="18" width="934" height="710" class="panel panel-right"/>
  <rect x="844" y="146" rx="16" ry="16" width="898" height="64" class="header-right"/>
  <text x="1293" y="188" text-anchor="middle" class="section">[RECHTER BEREICH / KONZEPT B]</text>

  <!-- rechter Code-/Beispielbereich -->
  <rect x="1005" y="236" rx="12" ry="12" width="500" height="92" class="placeholder-box"/>
  <text x="1255" y="292" text-anchor="middle" class="mono right-accent">[Code / Beispiel rechts]</text>

  <!-- rechte Zwischenüberschriften -->
  <text x="1015" y="382" text-anchor="middle" class="heading">[Teilbereich 1]</text>
  <text x="1460" y="382" text-anchor="middle" class="heading">[Teilbereich 2]</text>

  <!-- rechte Visualisierung links -->
  <rect x="844" y="414" rx="20" ry="20" width="315" height="150" class="viz-box"/>
  <text x="896" y="495" class="section">[B]</text>
  <rect x="938" y="456" width="168" height="74" class="inner-right"/>
  <text x="1022" y="502" text-anchor="middle" class="heading right-accent">[Wert]</text>

  <!-- rechte Visualisierung rechts -->
  <rect x="1225" y="414" rx="20" ry="20" width="450" height="290" fill="#f8f1e1" stroke="#d89b37" stroke-width="2.2"/>
  <text x="1450" y="458" text-anchor="middle" class="heading">[Objekt / Struktur]</text>

  <rect x="1252" y="478" width="150" height="66" fill="#fffaf1" stroke="#d89b37" stroke-width="2"/>
  <rect x="1402" y="478" width="246" height="66" fill="#fffaf1" stroke="#d89b37" stroke-width="2"/>
  <text x="1327" y="521" text-anchor="middle" class="text">[Label]</text>
  <text x="1525" y="521" text-anchor="middle" class="text hint-accent">[Wert]</text>

  <rect x="1252" y="544" width="396" height="124" rx="6" ry="6" fill="#fffaf1" stroke="#d89b37" stroke-width="2"/>
  <text x="1450" y="592" text-anchor="middle" class="text muted">[Zusatzinformation / Methode 1]</text>
  <text x="1450" y="632" text-anchor="middle" class="text muted">[Zusatzinformation / Methode 2]</text>

  <!-- rechter Verweispfeil horizontal -->
  <line x1="1110" y1="460" x2="1220" y2="460" class="arrow-right" marker-end="url(#arrowRight)"/>

  <!-- rechte Erklärung unten links -->
  <path d="M 1022 646 L 1022 530" class="arrow-right" marker-end="url(#arrowRight)"/>
  <text x="1022" y="688" text-anchor="middle" class="heading right-accent">[Erklärung rechts, Zeile 1]</text>
  <text x="1022" y="726" text-anchor="middle" class="heading right-accent">[Erklärung rechts, Zeile 2]</text>
  <text x="1022" y="782" text-anchor="middle" class="heading">[Kernaussage rechts, Zeile 1]</text>
  <text x="1022" y="820" text-anchor="middle" class="heading">[Kernaussage rechts, Zeile 2]</text>

  <!-- Hinweis rechts unten -->
  <path d="M 1450 760 L 1450 708" class="arrow-hint" marker-end="url(#arrowHint)"/>
  <text x="1450" y="790" text-anchor="middle" class="heading hint-accent">[Hinweis / Erklärung, Zeile 1]</text>
  <text x="1450" y="828" text-anchor="middle" class="heading hint-accent">[Hinweis / Erklärung, Zeile 2]</text>

  <!-- Zusammenfassung -->
  <rect x="60" y="888" rx="20" ry="20" width="1680" height="178" class="summary"/>
  <text x="98" y="934" class="section">Zusammenfassung</text>

  <circle cx="112" cy="978" r="6.5" fill="#6ca05f"/>
  <text x="132" y="986" class="text">[Zusammenfassung Punkt 1 links]</text>

  <circle cx="112" cy="1026" r="6.5" fill="#6ca05f"/>
  <text x="132" y="1034" class="text">[Zusammenfassung Punkt 2 links]</text>

  <circle cx="898" cy="978" r="6.5" fill="#2b65b3"/>
  <text x="918" y="986" class="text">[Zusammenfassung Punkt 1 rechts]</text>

  <circle cx="898" cy="1026" r="6.5" fill="#2b65b3"/>
  <text x="918" y="1034" class="text">[Zusammenfassung Punkt 2 rechts]</text>

  <!-- Hinweise für Bearbeitung -->
  <text x="60" y="1098" class="small">Hinweis: Platzhalter in eckigen Klammern ersetzen. Layout ist mit Sicherheitsabständen für Unterrichtsfolien und A4 ausgelegt.</text>
</svg>
