<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">SVG-Vorlage Architekturdiagramm für Unterricht</title>
  <desc id="desc">Wiederverwendbare Architektur-Vorlage mit Ebenen, Hauptfluss, Seitenelementen und Zusammenfassung.</desc>
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-regular { font: 400 22px Arial, Helvetica, sans-serif; fill: #222; }
      .mono { font: 700 28px 'Courier New', Courier, monospace; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }

      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .muted { fill: #666; }

      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }
      .panel-neutral { stroke: #b9bcc3; }

      .header-left { fill: #dfead8; stroke: #6ca05f; stroke-width: 2; }
      .header-right { fill: #dfe8f7; stroke: #6f9ce0; stroke-width: 2; }
      .header-neutral { fill: #f2f4f7; stroke: #b9bcc3; stroke-width: 2; }

      .placeholder-box { fill: #eef2ee; stroke: #bcc8bc; stroke-width: 1.5; }
      .viz-box { fill: #f3f5f7; stroke: #6b7078; stroke-width: 2.2; }
      .inner-left { fill: #e6efdf; stroke: #9dbc86; stroke-width: 2; }
      .inner-right { fill: #e8eef9; stroke: #9eb6e4; stroke-width: 2; }
      .hint-box { fill: #f8f1e1; stroke: #d89b37; stroke-width: 2.2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }

      .guide { fill: none; stroke: #c9cdd4; stroke-width: 1.5; stroke-dasharray: 8 8; }
      .arrow-left { stroke: #6ca05f; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-right { stroke: #2b65b3; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-hint { stroke: #c67f17; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .flow { stroke: #2b65b3; stroke-width: 3.2; fill: none; }
</style>
    
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6ca05f"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
    <marker id="arrowHint" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c67f17"/>
    </marker>

  </defs>
  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>
  <text x="900" y="72" text-anchor="middle" class="title">[TITEL DER ARCHITEKTURGRAFIK]</text>
  <text x="900" y="104" text-anchor="middle" class="small">SVG-Vorlage für Unterrichtsunterlagen · Architekturdiagramm · de-CH · EFZ Applikationsentwicklung</text>

  <!-- Hauptpanel -->
  <rect x="40" y="130" rx="18" ry="18" width="1260" height="740" class="panel panel-neutral"/>
  <rect x="58" y="146" rx="16" ry="16" width="1224" height="64" class="header-neutral"/>
  <text x="670" y="188" text-anchor="middle" class="section">[HAUPTARCHITEKTUR / SYSTEMÜBERSICHT]</text>

  <!-- Ebenen -->
  <rect x="110" y="248" rx="18" ry="18" width="1120" height="120" class="panel panel-left"/>
  <text x="190" y="316" class="section left-accent">[Ebene 1 / Client / User]</text>
  <rect x="760" y="272" rx="12" ry="12" width="390" height="70" class="placeholder-box"/>
  <text x="955" y="316" text-anchor="middle" class="text">[Beispiel / Tools / Rolle]</text>

  <rect x="110" y="402" rx="18" ry="18" width="1120" height="140" class="panel panel-right"/>
  <text x="190" y="480" class="section right-accent">[Ebene 2 / Anwendung / Service]</text>
  <rect x="760" y="432" rx="12" ry="12" width="180" height="78" class="inner-right"/>
  <rect x="960" y="432" rx="12" ry="12" width="180" height="78" class="inner-right"/>
  <text x="850" y="478" text-anchor="middle" class="text right-accent">[Komponente A]</text>
  <text x="1050" y="478" text-anchor="middle" class="text right-accent">[Komponente B]</text>

  <rect x="110" y="576" rx="18" ry="18" width="1120" height="140" class="panel panel-left"/>
  <text x="190" y="654" class="section left-accent">[Ebene 3 / Daten / Infrastruktur]</text>
  <rect x="760" y="606" rx="12" ry="12" width="180" height="78" class="inner-left"/>
  <rect x="960" y="606" rx="12" ry="12" width="180" height="78" class="inner-left"/>
  <text x="850" y="652" text-anchor="middle" class="text left-accent">[Datenbank]</text>
  <text x="1050" y="652" text-anchor="middle" class="text left-accent">[Speicher / Queue]</text>

  <!-- Vertikaler Hauptfluss -->
  <line x1="690" y1="368" x2="690" y2="402" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="690" y1="542" x2="690" y2="576" class="flow" marker-end="url(#arrowRight)"/>

  <!-- Seitliche Zusatzkomponenten -->
  <rect x="1340" y="130" rx="18" ry="18" width="420" height="740" class="panel panel-right"/>
  <rect x="1358" y="146" rx="16" ry="16" width="384" height="64" class="header-right"/>
  <text x="1550" y="188" text-anchor="middle" class="section">[ZUSATZKOMPONENTEN]</text>

  <rect x="1400" y="250" rx="14" ry="14" width="300" height="86" class="placeholder-box"/>
  <text x="1550" y="303" text-anchor="middle" class="heading">[CI/CD]</text>

  <rect x="1400" y="372" rx="14" ry="14" width="300" height="86" class="placeholder-box"/>
  <text x="1550" y="425" text-anchor="middle" class="heading">[Monitoring / Logging]</text>

  <rect x="1400" y="494" rx="14" ry="14" width="300" height="86" class="placeholder-box"/>
  <text x="1550" y="547" text-anchor="middle" class="heading">[Security / Auth]</text>

  <rect x="1400" y="616" rx="14" ry="14" width="300" height="86" class="placeholder-box"/>
  <text x="1550" y="669" text-anchor="middle" class="heading">[Externe Systeme]</text>

  <path d="M 1340 293 L 1232 293" class="arrow-right" marker-end="url(#arrowRight)"/>
  <path d="M 1340 537 L 1232 537" class="arrow-right" marker-end="url(#arrowRight)"/>

  <!-- Untere Erklärungsbox -->
  <rect x="110" y="748" rx="18" ry="18" width="1120" height="86" class="hint-box"/>
  <text x="670" y="800" text-anchor="middle" class="heading hint-accent">[Zentrale Erklärung / wichtigste Systemaussage]</text>

  <!-- Zusammenfassung -->
  <rect x="60" y="900" rx="20" ry="20" width="1680" height="166" class="summary"/>
  <text x="98" y="944" class="section">Zusammenfassung</text>
  <circle cx="112" cy="986" r="6.5" fill="#6ca05f"/>
  <text x="132" y="994" class="text">[Punkt 1: Hauptfluss / Architekturprinzip]</text>
  <circle cx="112" cy="1030" r="6.5" fill="#2b65b3"/>
  <text x="132" y="1038" class="text">[Punkt 2: Verantwortlichkeiten / Schichten]</text>
  <circle cx="900" cy="986" r="6.5" fill="#c67f17"/>
  <text x="920" y="994" class="text">[Punkt 3: Wichtige Zusatzkomponente / Betriebsaspekt]</text>
  <circle cx="900" cy="1030" r="6.5" fill="#2b65b3"/>
  <text x="920" y="1038" class="text">[Punkt 4: Merksatz / Prüfungsrelevanz]</text>

  <text x="60" y="1098" class="small">Hinweis: Ideal für Client-Server, Kubernetes, CI/CD-Architekturen oder Schichtenmodelle.</text>
</svg>
