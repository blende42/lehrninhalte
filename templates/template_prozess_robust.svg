<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">SVG-Vorlage Prozessdiagramm für Unterricht</title>
  <desc id="desc">Robustere Prozess-Vorlage mit breiteren Hinweisboxen, zusätzlichen Textklassen und stabileren Textzonen.</desc>
  <defs>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #111; }
      .section { font: 700 30px Arial, Helvetica, sans-serif; fill: #111; }
      .heading { font: 700 26px Arial, Helvetica, sans-serif; fill: #111; }
      .text { font: 700 22px Arial, Helvetica, sans-serif; fill: #111; }
      .text-regular { font: 400 22px Arial, Helvetica, sans-serif; fill: #222; }
      .text-tight { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .text-small { font: 400 18px Arial, Helvetica, sans-serif; fill: #222; }
      .mono { font: 700 26px 'Courier New', Courier, monospace; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #555; }

      .left-accent { fill: #4d8f3a; }
      .right-accent { fill: #2b65b3; }
      .hint-accent { fill: #c67f17; }
      .muted { fill: #666; }

      .panel { fill: #fbfcfb; stroke-width: 2.2; }
      .panel-left { stroke: #6ca05f; }
      .panel-right { stroke: #6f9ce0; }
      .panel-neutral { stroke: #b9bcc3; }

      .header-left { fill: #dfead8; stroke: #6ca05f; stroke-width: 2; }
      .header-right { fill: #dfe8f7; stroke: #6f9ce0; stroke-width: 2; }
      .header-neutral { fill: #f2f4f7; stroke: #b9bcc3; stroke-width: 2; }

      .placeholder-box { fill: #eef2ee; stroke: #bcc8bc; stroke-width: 1.5; }
      .viz-box { fill: #f3f5f7; stroke: #6b7078; stroke-width: 2.2; }
      .inner-left { fill: #e6efdf; stroke: #9dbc86; stroke-width: 2; }
      .inner-right { fill: #e8eef9; stroke: #9eb6e4; stroke-width: 2; }
      .hint-box { fill: #f8f1e1; stroke: #d89b37; stroke-width: 2.2; }
      .summary { fill: #f7f8fa; stroke: #b9bcc3; stroke-width: 2; }

      .guide { fill: none; stroke: #c9cdd4; stroke-width: 1.5; stroke-dasharray: 8 8; }
      .arrow-left { stroke: #6ca05f; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-right { stroke: #2b65b3; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .arrow-hint { stroke: #c67f17; stroke-width: 3.2; stroke-dasharray: 10 8; fill: none; }
      .flow { stroke: #2b65b3; stroke-width: 3.2; fill: none; }
    </style>

    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6ca05f"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b65b3"/>
    </marker>
    <marker id="arrowHint" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c67f17"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#ffffff"/>
  <text x="900" y="72" text-anchor="middle" class="title">[TITEL DES PROZESSDIAGRAMMS]</text>
  <text x="900" y="104" text-anchor="middle" class="small">Prozessdiagramm · de-CH · EFZ Applikationsentwicklung</text>

  <rect x="60" y="140" rx="20" ry="20" width="1680" height="620" class="panel panel-neutral"/>
  <rect x="80" y="158" rx="16" ry="16" width="1640" height="64" class="header-neutral"/>
  <text x="900" y="200" text-anchor="middle" class="section">[PROZESS / ABLAUF / PIPELINE]</text>

  <!-- Schritte: max. 3 kurze Zeilen -->
  <rect x="120" y="330" rx="18" ry="18" width="250" height="130" class="panel panel-left"/>
  <text x="245" y="378" text-anchor="middle" class="heading left-accent">[Schritt 1]</text>
  <text x="245" y="414" text-anchor="middle" class="text-tight">[Aktion / Input]</text>
  <text x="245" y="444" text-anchor="middle" class="text-tight">[Zeile 2 optional]</text>

  <rect x="440" y="330" rx="18" ry="18" width="250" height="130" class="panel panel-right"/>
  <text x="565" y="378" text-anchor="middle" class="heading right-accent">[Schritt 2]</text>
  <text x="565" y="414" text-anchor="middle" class="text-tight">[Verarbeitung]</text>
  <text x="565" y="444" text-anchor="middle" class="text-tight">[Zeile 2 optional]</text>

  <rect x="760" y="330" rx="18" ry="18" width="250" height="130" class="panel panel-left"/>
  <text x="885" y="378" text-anchor="middle" class="heading left-accent">[Schritt 3]</text>
  <text x="885" y="414" text-anchor="middle" class="text-tight">[Zwischenergebnis]</text>
  <text x="885" y="444" text-anchor="middle" class="text-tight">[Zeile 2 optional]</text>

  <rect x="1080" y="330" rx="18" ry="18" width="250" height="130" class="panel panel-right"/>
  <text x="1205" y="378" text-anchor="middle" class="heading right-accent">[Schritt 4]</text>
  <text x="1205" y="414" text-anchor="middle" class="text-tight">[Prüfung / Build]</text>
  <text x="1205" y="444" text-anchor="middle" class="text-tight">[Zeile 2 optional]</text>

  <rect x="1400" y="330" rx="18" ry="18" width="250" height="130" class="panel panel-left"/>
  <text x="1525" y="378" text-anchor="middle" class="heading left-accent">[Schritt 5]</text>
  <text x="1525" y="414" text-anchor="middle" class="text-tight">[Output / Resultat]</text>
  <text x="1525" y="444" text-anchor="middle" class="text-tight">[Zeile 2 optional]</text>

  <line x1="370" y1="395" x2="440" y2="395" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="690" y1="395" x2="760" y2="395" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="1010" y1="395" x2="1080" y2="395" class="flow" marker-end="url(#arrowRight)"/>
  <line x1="1330" y1="395" x2="1400" y2="395" class="flow" marker-end="url(#arrowRight)"/>

  <!-- Untere Notizen / Fehler / Hinweise: bewusst breiter und für 3 Zeilen geplant -->
  <rect x="140" y="540" rx="18" ry="18" width="500" height="132" class="hint-box"/>
  <text x="390" y="582" text-anchor="middle" class="heading hint-accent">[Typischer Fehler / Stolperstein]</text>
  <text x="390" y="618" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 1]</text>
  <text x="390" y="648" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 2]</text>

  <rect x="650" y="540" rx="18" ry="18" width="500" height="132" class="panel panel-right"/>
  <text x="900" y="582" text-anchor="middle" class="heading right-accent">[Entscheidung / Qualitätskriterium]</text>
  <text x="900" y="618" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 1]</text>
  <text x="900" y="648" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 2]</text>

  <rect x="1160" y="540" rx="18" ry="18" width="500" height="132" class="panel panel-left"/>
  <text x="1410" y="582" text-anchor="middle" class="heading left-accent">[Praxisbezug / Tool / Output]</text>
  <text x="1410" y="618" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 1]</text>
  <text x="1410" y="648" text-anchor="middle" class="text-tight">[kurze Erklärung, Zeile 2]</text>

  <path d="M 390 540 L 390 470" class="arrow-hint" marker-end="url(#arrowHint)"/>
  <path d="M 900 540 L 900 470" class="arrow-right" marker-end="url(#arrowRight)"/>
  <path d="M 1410 540 L 1410 470" class="arrow-left" marker-end="url(#arrowLeft)"/>

  <rect x="60" y="820" rx="20" ry="20" width="1680" height="246" class="summary"/>
  <text x="98" y="866" class="section">Zusammenfassung</text>
  <circle cx="112" cy="912" r="6.5" fill="#6ca05f"/>
  <text x="132" y="920" class="text-tight">[Punkt 1: Start / Input des Prozesses]</text>
  <circle cx="112" cy="958" r="6.5" fill="#2b65b3"/>
  <text x="132" y="966" class="text-tight">[Punkt 2: Wichtigster Verarbeitungsschritt]</text>
  <circle cx="112" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="132" y="1012" class="text-tight">[Punkt 3: Typischer Fehler / Qualitätsaspekt]</text>
  <circle cx="900" cy="912" r="6.5" fill="#2b65b3"/>
  <text x="920" y="920" class="text-tight">[Punkt 4: Ergebnis / Output]</text>
  <circle cx="900" cy="958" r="6.5" fill="#6ca05f"/>
  <text x="920" y="966" class="text-tight">[Punkt 5: Tool / Praxisbezug]</text>
  <circle cx="900" cy="1004" r="6.5" fill="#c67f17"/>
  <text x="920" y="1012" class="text-tight">[Punkt 6: Merksatz / Prüfungsrelevanz]</text>

</svg>
